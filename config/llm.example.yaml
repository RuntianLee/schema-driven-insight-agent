# LLM provider configuration template.
# Copy this file to config/llm.yaml and edit for your environment.
# config/llm.yaml is gitignored — this example file is safe to commit.
#
# Convention: the YAML names the env var that holds the secret;
# the actual key stays in the environment, never in committed files.

provider: minimax
endpoint: https://api.minimax.io/v1/text/chatcompletion_v2
model: MiniMax-M2.7

# format 选择 wire 协议（省略 / "openai" = OpenAI chat-completions，默认、向后兼容；
# "anthropic" = Anthropic Messages API，发 x-api-key + anthropic-version 头、解析 content[].text）。
# 用于经 Anthropic 兼容网关（如某些第三方代理）转发的 key——这类 key 走 Anthropic 协议，
# 用 OpenAI 格式打过去网关会回空 message。此时 endpoint 改 .../v1/messages、format 设 anthropic。
# format: anthropic

# api_key_env names the environment variable that holds your API key.
# This is the recommended approach — the file stays safe to commit.
api_key_env: MINIMAX_API_KEY

# api_key: "sk-..."
# Uncomment the line above to supply the key inline.
# WARNING: if you use api_key, you MUST gitignore config/llm.yaml (it is already
# gitignored by default). Never commit a file that contains a raw secret.

timeout_seconds: 60

# max_tokens 封顶单次生成（0 或省略 = 不发该字段，模型用默认上限）。
# 实证：对慢的推理模型/代理（如经 answer_grounding judge 的大 prompt），不封顶会触发
# 上百秒生成 + 网关超时；设 max_tokens（如 2000）把单次调用从 ~150s 压到 ~30-45s，
# 且不损判官判别力。给足以容纳期望输出，过小会截断。
max_tokens: 2000

# temperature 采样温度（省略 = 不发）。eval/judge 建议 0：确定性 + 通常更快收敛。
temperature: 0
