name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: |
            go.sum

      # framework (root module) — self-contained
      - name: build/vet/test framework
        run: |
          go build ./...
          go vet ./...
          go test -race ./...

      - name: toygame smoke (cmd/seed, zero-code)
        run: |
          go run ./cmd/seed -schema examples/toygame/schema.yaml -spec examples/toygame/seed.yaml
          echo "toygame seeded OK"

      # deterministic eval gate — mock lane, no LLM key needed
      - name: toygame eval gate (cmd/eval, mock lane)
        run: |
          go run ./cmd/eval \
            -schema examples/toygame/schema.yaml \
            -tasks examples/toygame/eval/tasks \
            -db examples/toygame/data/toygame.db

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: integration tests (testcontainers)
        run: go test -tags=integration ./etl/ -v
