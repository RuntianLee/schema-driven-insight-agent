version: 1
domain: bank_churn

# 真实公开数据集（Kaggle mathchi/churn-for-bank-customers，CC0，10k 行）。见同目录 NOTICE。
# 无时间戳：流失为 Exited 分类标签；data_as_of 显式声明（冻结快照）。
etl_policy:
  hash_salt: bankchurn_demo_v0   # 仅示例，非真实 PII 盐
  min_rows: 5000                 # 10k 行的半截抽取保护
  health_min_rows: 5000
  frozen: true
  data_as_of: 1704067200         # 2024-01-01 UTC，静态快照锚

tuning:
  groups_top_n: 5
  # 账户余额等连续列 distinct 高（Balance 6201 种）；默认阈值 1000 会让分桶查询
  # 不附逐桶 Data 行（仅给画像）。抬到数据集规模，让 balance 分桶的 5 行桶随响应返回
  # （分桶查询附带的就是 5 行桶，payload 仍极小）。
  rows_attach_threshold: 10000

data_sources:
  source:
    type: csv
    path: ./churn.csv            # 源文件（committed，类比 toygame 的 seed.yaml）
  layer2:
    type: sqlite
    path: ./data/churn.db        # 构建产物（gitignore，cmd/csv 重建）

state_tables:
  customers:
    nature: snapshot
    primary_key: [CustomerId]
    fields:
      CustomerId:      {type: int64,  role: actor_id, pk: true, pii: true}
      Surname:         {type: string, role: actor_name, pii: true, omit_in_layer2: true}
      CreditScore:     {type: int32,  role: power, index: true}
      Geography:       {type: string, role: dimension, index: true}
      Gender:          {type: string, role: dimension}
      Age:             {type: int32,  role: level, index: true}
      Tenure:          {type: int32,  role: tenure}
      Balance:         {type: int64,  role: balance, currency_type: account}
      EstimatedSalary: {type: int64,  role: balance, currency_type: salary}
      NumOfProducts:   {type: int32,  role: dimension}
      IsActiveMember:  {type: int32,  role: active_flag, index: true}
      Exited:          {type: int32,  role: churn_flag, index: true}
      # 不声明（schema-driven 天然忽略）：RowNumber, HasCrCard

derived_tables:
  customer_balances:
    derived_from: customers
    method: pivot_money_columns
    schema:
      # player_id 此处为 ETL 脱敏 hash（非原始 CustomerId）；不标 pii，可出现在 Digest。
      player_id:     {type: int64,  role: actor_id}
      currency_type: {type: string, role: currency_kind, glossary_key: currency_types}
      balance:       {type: int64,  role: balance}

glossary:
  currency_types:
    account: "账户余额（欧元）"
    salary:  "估算年薪（欧元）"
  buckets:
    # 圆整人类档位（非分位标定）；eval 期望计数在构建后实算钉死（见 plan B3/B4）。
    account_balance:
      - {min: 0,      max: 24999,  label: "0~25k"}
      - {min: 25000,  max: 49999,  label: "25k~50k"}
      - {min: 50000,  max: 99999,  label: "50k~100k"}
      - {min: 100000, max: 149999, label: "100k~150k"}
      - {min: 150000, max: null,   label: "150k+"}
    age:
      - {min: 18, max: 29, label: "18~29"}
      - {min: 30, max: 39, label: "30~39"}
      - {min: 40, max: 49, label: "40~49"}
      - {min: 50, max: 59, label: "50~59"}
      - {min: 60, max: null, label: "60+"}
