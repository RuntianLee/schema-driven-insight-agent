# train · threshold —— 高净值边界（>150k，严格大于）+ 其流失率。
id: high_balance_churn_insight
title: "高净值客户规模与流失（train）"
question: "余额超过 150000 欧元的高净值客户有多少？他们的流失率如何，对运营意味着什么？"
llm_turns:
  - '{"tool":"analyze","args":{"table":"customers","filters":[{"field":"Balance","op":">","value":150000}],"group_by":["Exited"],"aggregates":[{"fn":"count","as":"n"}],"order_by":[{"key":"Exited"}]}}'
  - "余额严格大于 150000 欧元的高净值客户共 20 人（边界：>150k，不含等于）。其中 12 人已流失、8 人留存，流失率 60%，远高于一般水平。高净值客户流失代价大，建议优先人工触达 + 专属权益挽留。"
fixture:
  tables:
    customers:
      groups:
        - {count: 12, values: {Balance: 200000, Exited: 1}}
        - {count: 8,  values: {Balance: 200000, Exited: 0}}
        - {count: 80, values: {Balance: 50000,  Exited: 0}}
evaluators:
  attribution_grounding:
    min_claims: 1
  claim_coverage: {}
  data_correctness:
    tool: analyze
    expect_status: OK
    # any_of：任一 shape 全过即 PASS。agent 既可能产 group_by-Exited 桶行，也可能产
    # ungrouped 聚合单行——两者都是合法正确算法，断言应同时接受（见诊断 T3 §11 分支 B）。
    any_of:
      # shape 1：金标准 group_by Exited（expect_any 按列名抗 count 前置列位移）
      - table:
        - match: {Exited: "0"}
          expect_any: [{columns: ["n", "count", "customer_count", "cnt"], value: 8}]
        - match: {Exited: "1"}
          expect_any: [{columns: ["n", "count", "customer_count", "cnt"], value: 12}]
      # shape 2：ungrouped 聚合单行（agent 实测 shape；rate 派生量不强断言降脆性）
      - table:
        - single_row: true
          expect_any:
            - {columns: ["total", "count", "n", "cnt"], value: 20}
            - {columns: ["churned", "sum_Exited", "exited_sum", "exited"], value: 12}
  reasoning_quality:
    rubric: "按 5 项打分（满分 5）：(1)正确给出高净值客户数（20）及流失/留存拆分（12/8）；(2)算出流失率 60%（12/20）；(3)明确点明边界定义——余额『严格大于 150000』、开闭方向（不含等于）、口径可复现可对比；(4)指出高净值客户流失代价高于普通客户、值得专门关注；(5)给出针对性挽留建议（人工触达/专属权益）。"
    min_score: 5
  insight_novelty:
    rubric: "是否点明阈值边界口径（取值/开闭/方向）需显式说明？"
    min_score: 3
