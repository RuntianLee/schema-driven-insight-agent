# held-out · mean —— 各地域人均年薪相等，但法国双峰离散，均值掩盖结构。
id: mean_salary_by_geo_insight
title: "各地域人均估算年薪（held-out）"
question: "各地域(Geography)客户的人均估算年薪(EstimatedSalary)是多少？哪个地域客群收入更高，运营含义？"
llm_turns:
  - '{"tool":"analyze","args":{"table":"customers","group_by":["Geography"],"aggregates":[{"fn":"avg","column":"EstimatedSalary","as":"avg_salary"}],"order_by":[{"key":"Geography"}]}}'
  - "三地域人均年薪均为 100000、完全相等。但相等的均值可能掩盖不同的分布结构——如法国可能由高低两端拉成同一均值。仅凭人均无法判断收入结构，应看分布/离散度再决定是否分层运营。"
fixture:
  tables:
    customers:
      groups:
        - {count: 50, values: {Geography: France,  EstimatedSalary: 20000}}
        - {count: 50, values: {Geography: France,  EstimatedSalary: 180000}}
        - {count: 100, values: {Geography: Germany, EstimatedSalary: 100000}}
        - {count: 100, values: {Geography: Spain,    EstimatedSalary: 100000}}
evaluators:
  data_correctness:
    tool: analyze
    expect_status: OK
    table:
      - match: {Geography: France}
        expect_pos: {1: 100000}
      - match: {Geography: Germany}
        expect_pos: {1: 100000}
      - match: {Geography: Spain}
        expect_pos: {1: 100000}
  reasoning_quality:
    rubric: "按 5 项打分（满分 5）：(1)正确给出各地域人均年薪均为 100000；(2)指出三者相等；(3)明确相等均值可能掩盖不同分布结构（同一均值可由不同分布产生）；(4)给出具体分布判断——应看离散度/分位而非只看均值，不能因均值相等就断定客群同质；(5)据此给审慎建议（需先看分布再决定是否分层运营）。"
    min_score: 5
  insight_novelty:
    rubric: "是否点出相等均值可能掩盖不同分布、需看离散度？"
    min_score: 3
  answer_grounding:
    rubric: "逐个检查定量主张是否接地：逐字出现在 qN 结果判 grounded；结果中找不到也无法派生判 ungrounded（尤其注意不得编造各地域具体分位/离散数值，结果里没有）。score=5 全接地；每个未接地主张显著扣分；score=1 多数悬空。"
    min_score: 4
