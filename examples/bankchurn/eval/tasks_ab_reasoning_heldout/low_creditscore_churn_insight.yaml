# held-out · threshold —— 信用分 <600（严格小于，边界方向与 train 相反）+ 流失率。
id: low_creditscore_churn_insight
title: "低信用分客户规模与流失（held-out）"
question: "信用分低于 600 的客户有多少？其流失率如何，运营含义？"
llm_turns:
  - '{"tool":"analyze","args":{"table":"customers","filters":[{"field":"CreditScore","op":"<","value":600}],"group_by":["Exited"],"aggregates":[{"fn":"count","as":"n"}],"order_by":[{"key":"Exited"}]}}'
  - "信用分严格小于 600 的客户共 30 人（边界：<600，不含等于）。其中 18 人已流失、12 人留存，流失率 60%。低信用分客群流失偏高，建议结合风险评估决定挽留力度。"
fixture:
  tables:
    customers:
      groups:
        - {count: 18, values: {CreditScore: 550, Exited: 1}}
        - {count: 12, values: {CreditScore: 550, Exited: 0}}
        - {count: 70, values: {CreditScore: 700, Exited: 0}}
evaluators:
  attribution_grounding:
    min_claims: 1
  claim_coverage: {}
  data_correctness:
    tool: analyze
    expect_status: OK
    # any_of：任一 shape 全过即 PASS。agent 既可能产 group_by-Exited 桶行，也可能产
    # ungrouped 聚合单行——两者都是合法正确算法，断言应同时接受。
    any_of:
      # shape 1：金标准 group_by Exited（expect_values 名字优先、生僻别名按值兜底）
      - table:
        - match: {Exited: "0"}
          expect_values: [{candidates: ["n", "count", "customer_count", "cnt"], value: 12}]
        - match: {Exited: "1"}
          expect_values: [{candidates: ["n", "count", "customer_count", "cnt"], value: 18}]
      # shape 2：ungrouped 聚合单行（候选含复合后缀别名（total_count/churned_count 等）；rate 派生量不强断言降脆性）
      - table:
        - single_row: true
          expect_values:
            - {candidates: ["total", "count", "n", "cnt", "total_count", "total_n"], value: 30}
            - {candidates: ["churned", "sum_Exited", "exited_sum", "exited", "churned_count", "churned_n"], value: 18}
  reasoning_quality:
    rubric: "按 5 项打分（满分 5）：(1)正确给出低信用分客户数（30）及流失/留存拆分（18/12）；(2)算出流失率 60%；(3)明确点明边界定义——信用分『严格小于 600』、开闭方向、口径可复现；(4)指出低信用分客群流失偏高；(5)给出结合风险评估的差异化挽留建议。"
    min_score: 5
  insight_novelty:
    rubric: "是否点明阈值边界口径（取值/开闭/方向）？"
    min_score: 3
