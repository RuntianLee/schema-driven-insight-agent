notes:
  - id: seed-shape-mean
    question: "各地域（或客群）的人均账户余额差异如何？哪个分组的客户更有资产价值？"
    summary: |
      均值类口径在银行余额场景下极易被结构性零值群体向下扭曲：当某分组内存在大量余额为零的客户时，
      该组均值会被显著压低，使跨组比较失真——均值低不等于客户不富裕，可能只是该组零余额客户占比更高。
      正确解读路径：先看 Balance=0 的客户占比（或零余额件数/总件数），再用条件均值（仅非零余额客群的均值）
      或中位数作补充口径，才能区分「客户本身资产差异」与「产品使用深度差异」。
      凡是跨地域/跨群体比较均值并得出「X 组客户更有价值」结论时，必须先排除零值结构差异的干扰，
      否则结论不可靠，运营策略也会指向错误细分。
    answer_outline: "先验证各分组零余额占比是否一致，再用条件均值或中位数对齐口径，最后才能比较跨组资产水位。"
    tags: ["reflection", "shape:mean", "agg:avg", "dim:1"]
    score: 0.9

  - id: seed-shape-threshold
    question: "余额超过某一金额的高净值客户有多少？他们的流失率是否值得重点关注？"
    summary: |
      阈值/边界类口径的最大陷阱是「边界本身未被显式声明」：取值（即临界点是哪个数字）、开闭方向
      （严格大于 vs. 大于等于）、达标方向（超过 vs. 低于）三要素缺一不可。
      在银行余额场景中，「高净值」通常按账户余额设定硬门槛；若仅说「余额较高的客户」而不给出精确边界，
      任何人都无法复现计数，流失率也就无从横向对比或历史回溯。
      正确解读路径：在引用任何阈值分群结论前，先写明过滤条件的完整口径（字段名、运算符、临界值），
      让读者能独立核算计数和比率，结论才具有可验证性。
    answer_outline: "在陈述高净值客户规模或流失率前，先明确声明阈值取值、开闭方向，确保口径可复现、可对比。"
    tags: ["reflection", "shape:threshold", "cmp:threshold"]
    score: 0.9

  - id: seed-shape-composite
    question: "高余额且已流失的客户在各地域如何分布？哪个地域应优先开展挽留？"
    summary: |
      复合口径问题（同时含过滤条件 + 分组维度的分析）最常见的解读错误是把「过滤」与「分组」混在同一步处理，
      导致两者相互污染：若先分组再做余额或流失筛选，部分地域可能包含不属于目标群体的客户；
      若过滤条件本身引用了分组维度字段，则地域分组的边界就模糊了。
      在银行客户流失分析中，正确路径是把复合口径拆成可独立验证的单步：
      第一步明确锁定过滤群体（如「高余额且已流失」），第二步再对该锁定群体按维度（如地域）分组计数。
      每一步用单一判断条件，步步落地到可验证的数据截面，才能保证地域集中度的结论不被样本混入所掩盖。
    answer_outline: "先按过滤条件独立锁定目标客群，再对该客群按分组维度聚合，两步分开定义、逐步对齐，避免过滤与分组相互污染。"
    tags: ["reflection", "shape:composite", "dim:2"]
    score: 0.9
